<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Taskionix</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #9499ff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            margin: 0;
            padding: 20px;
            padding-top: 12vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: #ffffff;
            overflow: hidden;
            pointer-events: none;
        }

        .vibrant-halo {
            position: absolute;
            top: -250px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse at center, rgba(192, 132, 252, 0.25) 0%, rgba(216, 180, 254, 0.15) 40%, transparent 70%);
            filter: blur(80px);
            opacity: 0.9;
            pointer-events: none;
            border-radius: 50%;
        }

        /* Floating Icons Background */
        .floating-icons-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .bg-icon {
            position: absolute;
            color: rgba(139, 92, 246, 0.15);
            font-size: 3rem;
            animation: floatAndRotate 20s infinite linear;
            pointer-events: none;
        }

        @keyframes floatAndRotate {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.2; }
            33% { transform: translate(100px, -150px) rotate(120deg) scale(1.2); opacity: 0.5; }
            66% { transform: translate(-150px, 100px) rotate(240deg) scale(0.8); opacity: 0.3; }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); opacity: 0.2; }
        }

        .icon-1 { top: 15%; left: 10%; animation-duration: 25s; }
        .icon-2 { top: 20%; right: 15%; animation-duration: 18s; animation-delay: -2s; }
        .icon-3 { bottom: 20%; left: 15%; animation-duration: 22s; animation-delay: -5s; }
        .icon-4 { bottom: 15%; right: 10%; animation-duration: 30s; animation-delay: -8s; }
        .icon-5 { top: 50%; left: 5%; animation-duration: 28s; animation-delay: -12s; }
        .icon-6 { top: 40%; right: 5%; animation-duration: 24s; animation-delay: -15s; }



        .login-wrapper {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-box {
            margin-bottom: 24px;
        }

        .logo-box img {
            height: 130px;
            width: auto;
            max-width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .subtitle a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .social-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .social-btn:hover {
            background: #f9fafb;
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: #9ca3af;
            font-size: 0.75rem;
            margin: 24px 0;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #f3f4f6;
        }

        .separator:not(:empty)::before {
            margin-right: 1rem;
        }

        .separator:not(:empty)::after {
            margin-left: 1rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(148, 153, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            margin-top: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            opacity: 0.5;
            cursor: not-allowed;
        }

        form:valid .btn-submit {
            opacity: 1;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.5);
        }

        form:valid .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.7);
            filter: brightness(1.05);
        }

        .forgot-link {
            display: block;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }


        .help-footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="bg-glow-container">
        <div class="vibrant-halo"></div>
        <div class="floating-icons-container">
            <i class="bi bi-check2-circle bg-icon icon-1"></i>
            <i class="bi bi-list-task bg-icon icon-2"></i>
            <i class="bi bi-clock bg-icon icon-3"></i>
            <i class="bi bi-cloud bg-icon icon-4"></i>
            <i class="bi bi-lightning bg-icon icon-5"></i>
            <i class="bi bi-calendar-check bg-icon icon-6"></i>
        </div>
    </div>
    <div class="login-wrapper">
        <div class="logo-box">
            <img src="/img/logo.png" alt="Taskionix Logo">
        </div>

        <h1>¡Te damos la bienvenida de nuevo!</h1>
        <p class="subtitle">¿No tienes una cuenta? <a href="/register">Regístrate</a></p>

        <button class="social-btn">
            <img src="https://www.google.com/favicon.ico" width="18">
            Continuar con Google
        </button>


        <div class="separator">o</div>

        <form id="loginForm">
            <input type="email" id="email" class="form-input" placeholder="Email" required>
            <input type="password" id="password" class="form-input" placeholder="Contraseña" required minlength="8">

            <button type="submit" class="btn-submit">Iniciar sesión</button>
        </form>

        <a href="#" class="forgot-link">¿Olvidaste la contraseña?</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/auth.js?v=2"></script>
</body>

</html>
